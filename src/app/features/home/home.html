@if (user(); as u) {
  <mat-card class="max-w-xl">
    <mat-card-header>
      <mat-card-title>Bem-vindo, {{ u.name }}</mat-card-title>
    </mat-card-header>
    <mat-card-content class="pt-4 flex flex-col gap-2">
      <p><strong>Nome:</strong> {{ u.name }}</p>
      <p><strong>E-mail:</strong> {{ u.email }}</p>
      <p><strong>Cargo:</strong> {{ u.role }}</p>
      <p>
        <strong>Último login:</strong>
        {{ u.lastLogin ? (u.lastLogin | date: 'short') : '—' }}
      </p>
    </mat-card-content>
  </mat-card>
}
