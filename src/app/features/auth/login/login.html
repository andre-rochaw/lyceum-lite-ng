<mat-card #card class="auth-card login-card" @cardEnter>
  <mat-card-header>
    <mat-card-title>Entrar</mat-card-title>
    <mat-card-subtitle>Acesse o sistema acadêmico</mat-card-subtitle>
  </mat-card-header>

  <mat-card-content class="auth-card__content">
    <form class="auth-card__form" [formGroup]="form" (ngSubmit)="submit()">
      <mat-form-field appearance="outline">
        <mat-label>E-mail</mat-label>
        <input matInput type="email" formControlName="email" autocomplete="username" />
        @if (form.controls.email.touched && form.controls.email.invalid) {
          <mat-error>Informe um e-mail válido</mat-error>
        }
      </mat-form-field>

      <mat-form-field appearance="outline">
        <mat-label>Senha</mat-label>
        <input matInput type="password" formControlName="password" autocomplete="current-password" />
        @if (form.controls.password.touched && form.controls.password.invalid) {
          <mat-error>Senha obrigatória</mat-error>
        }
      </mat-form-field>

      <button mat-flat-button color="primary" type="submit" [disabled]="submitting">
        Entrar
      </button>
    </form>
  </mat-card-content>

  <mat-card-actions align="end">
    <a mat-button routerLink="/register">Cadastrar-se</a>
  </mat-card-actions>
</mat-card>
