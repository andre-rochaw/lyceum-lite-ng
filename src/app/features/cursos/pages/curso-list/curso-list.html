<div class="flex flex-wrap items-center justify-between gap-4 mb-4">
  <h1 class="text-xl font-medium m-0">Cursos</h1>
  <a mat-flat-button color="primary" routerLink="/cursos/novo">
    <mat-icon>add</mat-icon>
    Novo curso
  </a>
</div>

@if (empty()) {
  <p class="text-sm opacity-70 mb-4">Nenhum curso cadastrado.</p>
}

<div class="table-wrap">
  <table mat-table [dataSource]="cursos()" class="w-full">
    <ng-container matColumnDef="nome">
      <th mat-header-cell *matHeaderCellDef>Nome</th>
      <td mat-cell *matCellDef="let row">{{ row.nome }}</td>
    </ng-container>

    <ng-container matColumnDef="descricao">
      <th mat-header-cell *matHeaderCellDef>Descricao</th>
      <td mat-cell *matCellDef="let row">{{ row.descricao || '?' }}</td>
    </ng-container>

    <ng-container matColumnDef="acoes">
      <th mat-header-cell *matHeaderCellDef>Acoes</th>
      <td mat-cell *matCellDef="let row">
        <a
          mat-icon-button
          [routerLink]="['/cursos', row.id, 'editar']"
          aria-label="Editar curso"
        >
          <mat-icon>edit</mat-icon>
        </a>
        <button
          mat-icon-button
          type="button"
          color="warn"
          aria-label="Excluir curso"
          (click)="confirmarExclusao(row)"
        >
          <mat-icon>delete</mat-icon>
        </button>
      </td>
    </ng-container>

    <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
    <tr mat-row *matRowDef="let row; columns: displayedColumns"></tr>
  </table>

  <mat-paginator
    [length]="totalElements()"
    [pageIndex]="pageIndex()"
    [pageSize]="pageSize()"
    [pageSizeOptions]="[5, 10, 20]"
    (page)="onPage($event)"
    showFirstLastButtons
  />
</div>
